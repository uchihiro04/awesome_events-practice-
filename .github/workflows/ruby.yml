name: Rails Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          # ✅ 変更: .ruby-versionから自動取得
          ruby-version: .ruby-version
          bundler-cache: true

      # ✅ 残す: Elasticsearchを使っているので必要
      - name: Configure sysctl limits
        run: |
          sudo swapoff -a
          sudo sysctl -w vm.swappiness=1
          sudo sysctl -w fs.file-max=262144
          sudo sysctl -w vm.max_map_count=262144

      - name: Run Elasticsearch
        uses: perfect-ruby-on-rails/elasticsearch-with-plugins-action@v1
        with:
          stack-version: 7.6.0
          plugins: |
            analysis-kuromoji

      # ✅ 残す: SQLite3を使っているので必要
      - name: Install SQLite dependencies
        run: sudo apt-get -yqq install libsqlite3-dev

      - name: Bundle install
        run: bundle install --jobs 4 --retry 3

      - name: Create database
        run: bin/rails db:create

      - name: Run migrations
        run: bin/rails db:migrate

      # ✅ 残す: Node.jsとyarnが必要
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JavaScript packages
        run: bin/yarn install

      # ✅ 残す: Minitestをそのまま使う
      - name: Run Rails tests
        run: bin/rails test

      # ✅ 残す: System Testも実行する
      # ✅ 追加: System TestにはChromeが必要なのでセットアップを追加
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run System tests
        run: bin/rails test:system
